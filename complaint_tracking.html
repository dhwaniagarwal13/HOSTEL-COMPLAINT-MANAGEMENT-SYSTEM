<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complaint History - HostelCare</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-logo">HostelCare</div>
            
            <div style="margin-bottom: 2rem;">
                <div class="text-xs font-medium text-muted mb-2 px-4" style="text-transform: uppercase;">Menu</div>
                <a href="student_dashboard.html" class="nav-link">
                    <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
                    Dashboard
                </a>
                <a href="complaint_tracking.html" class="nav-link active">
                    <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"></path></svg>
                    Complaint History
                </a>
                <a href="#" class="nav-link" onclick="alert('Profile Configuration')">
                    <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                    Profile
                </a>
                <a href="#" class="nav-link" onclick="alert('Viewing Notifications')">
                    <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path></svg>
                    Notifications
                </a>
                <a href="#" class="nav-link" onclick="alert('Opening Settings')">
                    <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                    Settings
                </a>
            </div>

            <div style="margin-top: auto;">
                <button class="nav-link" style="width: 100%; border: none; background: transparent; text-align: left; color: var(--danger);" onclick="logout()">
                    <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                    Logout
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="text-sm text-muted mb-2">
                <a href="student_dashboard.html">Dashboard</a> / <span style="font-weight: 500; color: var(--text-main);">Complaint History</span>
            </div>
            
            <div class="header">
                <div>
                    <h1>Track Complaints</h1>
                    <p class="text-muted text-sm mt-1">Review the status and updates of all your submitted complaints.</p>
                </div>
                <div class="flex gap-4">
                    <button class="btn btn-primary" onclick="window.location.href='complaint_creation_flow.html'">Make Complaint</button>
                </div>
            </div>

            <!-- List -->
            <div class="card">
                <div class="flex justify-between align-center mb-6" style="flex-wrap: wrap; gap: 1rem;">
                    <div class="search-bar-container" style="flex: 1; min-width: 250px;">
                        <svg class="search-icon" width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                        <input type="text" class="form-control" id="searchInput" placeholder="Search by ID or keywords..." onkeyup="filterComplaints()">
                    </div>
                    <div class="flex gap-2">
                        <select class="form-control" id="categoryFilter" onchange="filterComplaints()">
                            <option value="All">All Categories</option>
                            <option value="Electrical">Electrical</option>
                            <option value="Plumbing">Plumbing</option>
                            <option value="Water">Water</option>
                            <option value="Housekeeping">Housekeeping</option>
                            <option value="Furniture">Furniture</option>
                            <option value="Internet">Internet</option>
                            <option value="Other">Other</option>
                        </select>
                        <select class="form-control" id="statusFilter" onchange="filterComplaints()">
                            <option value="All">All Statuses</option>
                            <option value="Submitted">Submitted</option>
                            <option value="Assigned">Assigned</option>
                            <option value="In Progress">In Progress</option>
                            <option value="Resolved">Resolved</option>
                        </select>
                    </div>
                </div>
                
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Category</th>
                                <th>Urgency</th>
                                <th>Date Submitted</th>
                                <th>Status</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="complaintsTableBody">
                            <!-- Populated via JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
    <script>
        requireAuth(['student']);
        const user = getCurrentUser();
        let myComplaints = [];

        function loadData() {
            const allComplaints = getComplaints();
            myComplaints = allComplaints.filter(c => c.studentId === user.id);
            renderTable(myComplaints);
        }

        function filterComplaints() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            const cat = document.getElementById('categoryFilter').value;
            const stat = document.getElementById('statusFilter').value;
            
            let filtered = myComplaints;
            
            if (term) {
                filtered = filtered.filter(c => 
                    c.id.toLowerCase().includes(term) || 
                    c.title.toLowerCase().includes(term) ||
                    (c.description && c.description.toLowerCase().includes(term))
                );
            }
            if (cat !== 'All') {
                filtered = filtered.filter(c => c.category === cat);
            }
            if (stat !== 'All') {
                filtered = filtered.filter(c => c.status === stat);
            }
            
            renderTable(filtered);
        }

        function renderTable(data) {
            const tbody = document.getElementById('complaintsTableBody');
            tbody.innerHTML = '';
            
            if (data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted py-8">No complaints match the criteria.</td></tr>';
                return;
            }

            data.forEach(c => {
                const tr = document.createElement('tr');
                // Ensure legacy standard for status if needed
                const status = c.status || 'Submitted';
                tr.innerHTML = `
                    <td class="font-medium" style="color: var(--primary); cursor: pointer;" onclick="viewDetails('${c.id}')">${c.id}</td>
                    <td>${c.category}</td>
                    <td>${getUrgencyBadge(c.urgency)}</td>
                    <td>${formatDate(c.date)}</td>
                    <td>${getStatusBadge(status)}</td>
                    <td>
                        <button class="btn btn-secondary text-sm" style="padding: 0.25rem 0.625rem;" onclick="viewDetails('${c.id}')">Track</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function viewDetails(id) {
            window.location.href = `complaint_details_student.html?id=${id}`;
        }

        loadData();
    </script>
</body>
</html>
